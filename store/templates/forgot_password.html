{% extends "website/base.html" %}
{% load static %}
{% block title %}Forgot Password — My Store{% endblock %}
{% block content %}
<h1>Forgot Password</h1>
<div id="step1">
    <label>Email:</label>
    <input type="email" id="email" required><br>
    <button onclick="sendOTP()">Send OTP</button>
</div>
<div id="step2" style="display:none;">
    <label>OTP:</label>
    <input type="text" id="otp" required><br>
    <label>New Password:</label>
    <input type="password" id="password" required><br>
    <button onclick="resetPassword()">Reset Password</button>
</div>
<div id="message"></div>

<script src="{% static 'js/otp.js' %}"></script>
{% endblock %}

<style>
h1 {     
    font-size: 1.75rem;
    margin-bottom: 1rem;
}      
label {
    display: block;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
}
input {
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    outline: none;
}
button {
    margin-top: 1.5rem;
    border: none;
    border-radius: 8px;
    background: #1fc728;
    color: white;
    padding: 0.75rem 1.5rem;
    font-weight: 700;
    cursor: pointer;
}
button:hover {
    background: #14971a;
}
#message {
    margin-top: 1.5rem;
    font-size: 1.1rem;
}
</style>
